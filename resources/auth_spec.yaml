openapi: 3.0.3
info:
  title: Dataverse Authentication API
  description: Obtain an OAuth2 token from Dataverse using client credentials.
  version: 1.0.1
servers:
  - url: "https://login.microsoftonline.com"
    description: Base URL for Dataverse authentication
paths:
  /{tenant_id}/oauth2/{loginApiVersion}/token:
    post:
      summary: Get OAuth2 Token
      description: Obtain an access token using client credentials (`client_id`, `client_secret`) and `scope`.
      operationId: getOAuthToken
      tags:
        - Authentication
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: The Dataverse tenant ID
        - name: loginApiVersion
          in: path
          required: true
          schema:
            type: string
            example: v1.0
          description: API version for authentication
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: Client ID of your application
                client_secret:
                  type: string
                  description: Client secret of your application
                grant_type:
                  type: string
                  description: OAuth2 grant type
                  example: client_credentials
                scope:
                  type: string
                  description: OAuth2 scope for the token
                  example: https://<your-dataverse-instance>/.default
              required:
                - client_id
                - client_secret
                - grant_type
                - scope
      responses:
        "200":
          description: Successful token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 3600
                    description: Lifetime of the token in seconds
                  access_token:
                    type: string
                    description: OAuth2 access token
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    clientCredentials:
      type: http
      scheme: basic
security:
  - clientCredentials: []
